name: CI — Build, Test & Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Unit Tests ──────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/test_formatter.py tests/test_use_cases.py tests/test_telegram_sender.py -v

  # ── 3. Docker Build & Push ─────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t finance-forecaster:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm finance-forecaster:${{ github.sha }} python -c "
          from src.adapters.message_formatter import ReportFormatter
          from src.adapters.rss_parser import FeedparserRSSParser
          print('All imports OK — image is healthy')
          "

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag finance-forecaster:${{ github.sha }} kaitobui/finance_forecaster:latest
          docker tag finance-forecaster:${{ github.sha }} kaitobui/finance_forecaster:${{ github.sha }}
          docker push kaitobui/finance_forecaster:latest
          docker push kaitobui/finance_forecaster:${{ github.sha }}
