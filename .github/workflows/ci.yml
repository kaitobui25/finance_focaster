name: CI — Build, Test & Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Unit Tests ──────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/test_formatter.py tests/test_use_cases.py tests/test_telegram_sender.py -v

  # ── 2. Integration Test (with PostgreSQL) ──────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forecaster
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: finance_forecaster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forecaster -d finance_forecaster"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: |
          PGPASSWORD=testpass psql -h localhost -U forecaster -d finance_forecaster -f db/init.sql

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://forecaster:testpass@localhost:5432/finance_forecaster
          GEMINI_API_KEY: test_key_for_ci
          FEEDS_CONFIG_PATH: feeds.yaml
        run: python -m pytest tests/test_integration.py -v

  # ── 3. Docker Build ────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finance-forecaster:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm finance-forecaster:${{ github.sha }} python -c "
          from src.adapters.message_formatter import ReportFormatter
          from src.adapters.rss_parser import FeedparserRSSParser
          print('All imports OK — image is healthy')
          "
