# RSS Feed Sources
# Add/remove feeds here. The crawler will process all feeds listed below.
# Format:
#   - name: Human-readable name
#     url: RSS feed URL
#     category: Category for grouping (e.g., japan_market, global_business)
#     language: Feed language (default: en)

feeds:
    - name: "Japan Times Business"
      url: "https://news.google.com/rss/search?q=www.japantimes.co.jp/business+when:1d&hl=en-US&gl=US&ceid=US:en"
      category: "japan_market"
      language: "en"

    - name: "Nikkei Asia Economy"
      url: "https://news.google.com/rss/search?q=asia.nikkei.com/economy/east-asia/japan+when:1d&hl=en-US&gl=US&ceid=US:en"
      category: "japan_market"
      language: "en"

    - name: "Reuters Business"
      url: "https://news.google.com/rss/search?q=site:reuters.com/business+when:1d&hl=en-US&gl=US&ceid=US:en"
      category: "global_business"
      language: "en"
