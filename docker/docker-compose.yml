version: "3.9"

services:
    # ── PostgreSQL ────────────────────────────────────────
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: forecaster
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1111}
            POSTGRES_DB: finance_forecaster
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ../db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
        ports:
            - "5432:5432"
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U forecaster -d finance_forecaster"]
            interval: 5s
            timeout: 3s
            retries: 5

    # ── Finance Forecaster App ────────────────────────────
    # Note: Docker username kaitobui
    app:
        image: kaitobui/finance_forecaster:latest
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - ../.env
        environment:
            # Override DB URL to use container hostname
            DATABASE_URL: postgresql://forecaster:${POSTGRES_PASSWORD:-1111}@db:5432/finance_forecaster

volumes:
    pgdata:
